version: '3.8'

services:
  web_dashboard:
    build: .
    container_name: v380_dashboard
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data
    environment:
      - RTSP_URL=${RTSP_URL}
      - OLLAMA_URL=http://ollama_engine:11434
    depends_on:
      - ollama_engine
    restart: unless-stopped

  ollama_engine:
    image: ollama/ollama:latest
    container_name: ollama_engine
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

volumes:
  ollama_storage:
